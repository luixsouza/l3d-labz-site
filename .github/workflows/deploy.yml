# Deploy de produção — server caseiro `contta-inteligencia`, alcançado via Tailscale.
#
# Dispara automaticamente em push na main (e manualmente via workflow_dispatch).
# O runner do GitHub entra na tailnet (Tailscale) p/ chegar no IP 100.113.195.104.
#
# Pré-requisitos no server (uma vez): o projeto em /home/contta/sites/l3dlabz
# precisa ser um `git clone` e ter o .env.prod.
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   TS_OAUTH_CLIENT_ID / TS_OAUTH_SECRET  -> OAuth client da Tailscale (tag:ci)
#   SSH_KEY                               -> chave PRIVADA SSH autorizada no server (contta)
# Sem esses 3 secrets o job falha no passo da Tailscale.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar na Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH (git reset --hard + compose up)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id contta@100.113.195.104 '
            set -e
            cd /home/contta/sites/l3dlabz
            # reset --hard (e nao pull): a historia da main pode ser reescrita/force-push
            git fetch origin
            git reset --hard origin/main
            docker compose --env-file .env.prod build
            docker compose --env-file .env.prod up -d
            docker image prune -f
          '
